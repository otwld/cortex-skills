name: design-intake
description: "Internal Cortex module applied before ambiguous, creative, behavioral, user-facing, or architecture-affecting work where desired outcome, task type, scope, constraints, or success criteria are not already clear."
activation: routed
visibility: hidden
status: active

routing:
  priority: 5
  signals:
    strong:
      - "Intent clarification: desired outcome, what the user wants to do, task type, scope, constraints, audience, or success criteria are not clear before planning or challenge"
    medium:
      - "Goal, understand what I want, what I want to do, behavior, architecture, user experience, audience, scope, or success criteria need clarification"
    weak:
      - "Intent clarification"

relations:
  before: []
  with:
    - "grill-with-docs"
    - "prototype"
    - "architecture-drift-detector"
    - "library-placement-decision"
    - "public-api-design"
  after:
    - "implementation-plan"
  excludes: []
  replaces: []

uses: []

resources:
  references: []
  scripts: []
  templates: []
  assets: []
