name: "bricks"
description: "Internal Cortex module applied when working with Bricks in consumer Nx workspaces: initializing metadata, registering sources, installing projects, merging source updates, comparing installed copies, checking state, running doctor, or contributing consumer edits back to source repos through dedicated worktrees. Do not use for Nx release, npm publishing, or source-repo maintainer release workflows unless Bricks consumer state is directly involved."
activation: "routed"
visibility: "hidden"
status: "active"
routing:
  priority: 5
  facets:
    intents:
      - "Inspect Bricks consumer workspace state"
      - "Run Bricks install or source-update workflow"
      - "Prepare Bricks contribution worktree"
    surfaces:
      - "Consumer Nx workspace"
      - "Bricks metadata"
      - "Installed brick source files"
      - "Bricks source cache"
      - "Bricks contribution worktree"
    risks:
      - "Consumer edits are overwritten"
      - "Source cache is mistaken for editable contribution worktree"
      - "Release workflow is mistaken for consumer workflow"
      - "Manual file copy bypasses Bricks provenance"
    artifacts:
      - ".bricks/config.json"
      - ".bricks/sources/<source>"
      - "Installed app or library files"
      - "Source contribution branch"
    repo:
      - "apps/**"
      - "libs/**"
      - "packages/**"
    request:
      - "bricks init, source, install, merge, diff, status, remove, doctor, or contribute"
      - "Installed brick local edits, source update, merge conflict, or contribution session"
      - "Compare consumer copy to source or push consumer fixes upstream through Bricks"
lifecycle:
  activate: "lifecycle/activate.md"
  run: "lifecycle/run.md"
  verify: "lifecycle/verify.md"
uses: []
resources:
  references:
    - "cli-workflows.md"
    - "contribution-workflow.md"
    - "product-model.md"
  scripts: []
  templates: []
  assets: []
