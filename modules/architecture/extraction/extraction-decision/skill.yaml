  facets:
    intents:
      - "decide whether repeated code should become an owned abstraction"
      - "separate stable shared behavior from coincidental similarity"
    surfaces:
      - "duplicated logic, DTOs, contracts, and orchestration"
      - "UI composition and data-access patterns"
      - "consumer variation points"
      - "abstraction owner and public API"
      - "dependency direction"
    risks:
      - "shared helper extracted from coincidental shape"
      - "new abstraction has no stable owner"
      - "dependency direction is inverted for convenience"
      - "extraction creates a shallow common module"
    artifacts:
      - "duplicated code cluster"
      - "extracted function, component, service, contract, or adapter"
      - "consumer inventory"
      - "variation analysis"
      - "reusable-abstraction decision record"
    repo:
      - "TypeScript workspace"
      - "modular application codebase"
    request:
      - "mentions repeated logic, duplicated DTO shape, copied orchestration, reusable data access, or repeated UI composition"
      - "asks whether code should be extracted, shared, kept local, or moved to an owner"
      - "plans a reusable abstraction from multiple current consumers"
