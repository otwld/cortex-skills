name: "extraction-decision"
description: "Internal Cortex module applied when repeated logic, DTOs, contracts, data-access patterns, UI composition, or orchestration suggest extracting a reusable abstraction."
activation: "routed"
visibility: "hidden"
status: "active"
routing:
