name: "setup-routed-skill-workspace"
description: "Use only when the user explicitly includes $setup-routed-skill-workspace; creates entry-named Cortex-like routed skill workspaces and authors new routed modules or command atoms with lifecycle phases, facets, generated routing views, and validation scripts."
activation: "explicit"
visibility: "public"
status: "active"
uses:
  - "scripts/rebuild-routed-skills.py"
  - "scripts/validate-routed-skills.py"
  - "scripts/test-validate-routed-skills.py"
resources:
  references:
    - "operations.md"
    - "routed-workspace-contract.md"
  scripts: []
  templates: []
  assets:
    - "templates/entry/SKILL.md.template"
    - "templates/entry/agents/openai.yaml.template"
    - "templates/entry/skill.yaml"
    - "templates/config-command/SKILL.md.template"
    - "templates/config-command/agents/openai.yaml.template"
    - "templates/config-command/skill.yaml.template"
    - "templates/command/SKILL.md.template"
    - "templates/command/agents/openai.yaml.template"
    - "templates/command/skill.yaml"
    - "templates/generated/SKILL_CATALOG.md"
    - "templates/generated/module-cascade.md"
    - "templates/generated/module-graph.md"
    - "templates/gitignore.template"
    - "templates/module/lifecycle/activate.md"
    - "templates/module/lifecycle/plan.md"
    - "templates/module/lifecycle/run.md"
    - "templates/module/lifecycle/review.md"
    - "templates/module/lifecycle/verify.md"
    - "templates/module/lifecycle/finalize.md"
    - "templates/module/skill.yaml"
    - "templates/routed-skills.yaml"
    - "templates/scripts/rebuild-routed-skills.py"
    - "templates/scripts/validate-routed-skills.py"
    - "templates/scripts/test-validate-routed-skills.py"
