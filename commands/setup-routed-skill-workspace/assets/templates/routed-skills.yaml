name: {{workspace_name}}
root: {{root}}

paths:
  entry: entry
  modules: modules
  commands: commands
  shared: shared
  generated: generated

artifacts:
  metadata: skill.yaml

entry:
  required: true
  path: entry/{{entry_slug}}

routing:
  facets:
    keys:
      - intents
      - surfaces
      - risks
      - artifacts
      - repo
      - request

lifecycle:
  phases:
    - activate
    - plan
    - run
    - review
    - verify
    - finalize

generated:
  catalog: generated/SKILL_CATALOG.md
  graph: generated/module-graph.md
  cascade: generated/module-cascade.md
