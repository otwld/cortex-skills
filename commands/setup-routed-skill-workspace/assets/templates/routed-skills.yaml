name: {{workspace_name}}
root: {{root}}

paths:
  entry: entry
  modules: modules
  commands: commands
  shared: shared
  generated: generated
  proposals: proposals

artifacts:
  metadata: skill.yaml
  instructions: instructions.md

entry:
  required: true
  path: entry/{{entry_slug}}

routing:
  always: []

generated:
  catalog: generated/SKILL_CATALOG.md
  graph: generated/module-graph.md
  cascade: generated/module-cascade.md

validation:
  max_before_depth: 3
